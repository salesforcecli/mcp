# Complex detection test cases
# All three antipattern types in one class
# Prompts range from terse to conversational — none spell out every parameter

- id: "complex-all-three-001"
  description: "All three antipatterns - terse 'scan this' with just the path"
  fixture: "complex/all-three-antipatterns.cls"
  className: "AllThreeAntipatterns"
  prompt: "Scan {apexFilePath} for bad practices. Use scan_apex_class_for_antipatterns tool."
  expectedResults:
    antipatternCount: 3
    antipatterns:
      - type: "GGD"
        count: 1
        severity: "critical"
      - type: "SOQL_NO_WHERE_LIMIT"
        count: 1
        severity: "major"
      - type: "SOQL_UNUSED_FIELDS"
        count: 1
        severity: "minor"
    falsePositiveTypes: []
    noAntipatterns: false
  scoring:
    factualAccuracy:
      weight: 0.25
    completeness:
      weight: 0.25
    toolEfficiency:
      weight: 0.35
      expectedToolName: "scan_apex_class_for_antipatterns"
      maxToolCalls: 4
    responseQuality:
      weight: 0.15

