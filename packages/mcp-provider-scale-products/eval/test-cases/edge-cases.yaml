# Edge case test cases
# Antipatterns in comments, empty classes, tricky prompts
# Tests the hardest scenarios: false positives, very vague prompts, no technical jargon

- id: "edge-comments-only-001"
  description: "Antipatterns in comments only - dev asks to 'review' the file"
  fixture: "edge-cases/comments-only.cls"
  className: "CommentsOnlyClass"
  prompt: "Review {apexFilePath} for me"
  expectedResults:
    antipatternCount: 0
    antipatterns: []
    falsePositiveTypes:
      - "GGD"
      - "SOQL_NO_WHERE_LIMIT"
      - "SOQL_UNUSED_FIELDS"
    noAntipatterns: true
  scoring:
    factualAccuracy:
      weight: 0.30
    completeness:
      weight: 0.25
    toolEfficiency:
      weight: 0.30
      expectedToolName: "scan_apex_class_for_antipatterns"
      maxToolCalls: 4
    responseQuality:
      weight: 0.15

