- id: "edge-indirect-governor-limits-001"
  description: "Dev mentions governor limits but doesn't say scan or antipattern"
  fixture: "medium/mixed-two-types.cls"
  className: "MixedTwoTypesClass"
  prompt: >-
    I'm worried about governor limits. Can you look at {apexFilePath} and tell me
    if there's anything that could cause problems at scale?
  expectedResults:
    antipatternCount: 2
    antipatterns:
      - type: "GGD"
        count: 1
        severity: "critical"
      - type: "SOQL_NO_WHERE_LIMIT"
        count: 1
        severity: "major"
    falsePositiveTypes: []
    noAntipatterns: false
  scoring:
    factualAccuracy:
      weight: 0.25
    completeness:
      weight: 0.25
    toolEfficiency:
      weight: 0.35
      expectedToolName: "scan_apex_class_for_antipatterns"
      maxToolCalls: 4
    responseQuality:
      weight: 0.15

