# Medium complexity detection test cases
# Multiple instances or mixed types
# Prompts mimic real dev behavior — abbreviations, partial info, varied phrasing

- id: "medium-unused-fields-001"
  description: "SOQL unused fields - dev asks about query efficiency"
  fixture: "medium/soql-unused-fields.cls"
  className: "SOQLUnusedFieldsClass"
  prompt: "Are we querying too many fields in {apexFilePath}? Feels wasteful."
  expectedResults:
    antipatternCount: 1
    antipatterns:
      - type: "SOQL_UNUSED_FIELDS"
        count: 1
        severity: "minor"
    falsePositiveTypes: []
    noAntipatterns: false
  scoring:
    factualAccuracy:
      weight: 0.25
    completeness:
      weight: 0.25
    toolEfficiency:
      weight: 0.35
      expectedToolName: "scan_apex_class_for_antipatterns"
      maxToolCalls: 4
    responseQuality:
      weight: 0.15

