# Simple detection test cases
# Single antipattern or no antipatterns
# Prompts are intentionally vague/realistic — devs rarely hand-feed every param

- id: "simple-ggd-001"
  description: "Single GGD call - terse scan request with just the file path"
  fixture: "simple/single-ggd.cls"
  className: "SingleGGDClass"
  prompt: "Scan {apexFilePath}"
  expectedResults:
    antipatternCount: 1
    antipatterns:
      - type: "GGD"
        count: 1
        severity: "critical"
    falsePositiveTypes: []
    noAntipatterns: false
  scoring:
    factualAccuracy:
      weight: 0.30
    completeness:
      weight: 0.25
    toolEfficiency:
      weight: 0.30
      expectedToolName: "scan_apex_class_for_antipatterns"
      maxToolCalls: 3
    responseQuality:
      weight: 0.15

